name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller R16_AudioTool.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: R16_AudioTool-Windows
          path: dist/R16_AudioTool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system aubio
        run: brew install aubio

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
        env:
          CFLAGS: "-Wno-incompatible-function-pointer-types"

      - name: Build app
        run: pyinstaller R16_AudioTool.spec

      - name: Zip macOS binary
        run: |
          cp start_mac.command dist/start_mac.command
          chmod +x dist/R16_AudioTool dist/start_mac.command
          cd dist && zip R16_AudioTool-macOS.zip R16_AudioTool start_mac.command

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: R16_AudioTool-macOS
          path: dist/R16_AudioTool-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: R16_AudioTool-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: R16_AudioTool-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            R16_AudioTool.exe
            R16_AudioTool-macOS.zip
          generate_release_notes: true
